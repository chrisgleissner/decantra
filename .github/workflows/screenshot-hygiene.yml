name: Screenshot Hygiene

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches:
      - "**"

jobs:
  pixel-dedupe:
    name: Pixel duplicate audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Fetch main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Verify screenshots are not pixel-identical to main
        run: |
          python scripts/prune_duplicate_screenshots.py --base origin/main --mode check --scope branch